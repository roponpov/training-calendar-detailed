<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Stamina Training Calendar 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07080f;
  --card:#0f1020;
  --card2:#131522;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.14);
  --text:#eef0f8;
  --muted:#6b7280;
  --muted2:#9ca3af;
  --p1:#ff6b47;
  --p2:#e8ff47;
  --p3:#47d4ff;
  --p4:#b47cff;
  --radius:10px;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Outfit',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 10% 5%, rgba(255,107,71,0.06) 0%, transparent 55%),
    radial-gradient(ellipse 50% 50% at 90% 95%, rgba(71,212,255,0.05) 0%, transparent 55%),
    radial-gradient(ellipse 40% 30% at 50% 50%, rgba(180,124,255,0.02) 0%, transparent 60%);
}

/* ── HEADER ── */
.app-header{
  position:sticky;top:0;z-index:100;
  background:rgba(7,8,15,0.95);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:10px 16px;
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  gap:10px;
}
.app-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;
  letter-spacing:2.5px;
  white-space:nowrap;
  line-height:1;
}
.app-title span{color:var(--p2);}

.phase-pills{
  display:flex;
  gap:4px;
  flex-wrap:wrap;
  justify-content:center;
}
.phase-pill{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;
  padding:4px 8px;
  border-radius:20px;
  border:1px solid;
  cursor:pointer;
  transition:all 0.2s;
  white-space:nowrap;
  user-select:none;
  letter-spacing:0.3px;
}
.phase-pill:hover{opacity:1!important;transform:scale(1.05);}
.phase-pill.active{opacity:1!important;}
.phase-pill:not(.active){opacity:0.35;}
.p1-pill{color:var(--p1);border-color:var(--p1);background:rgba(255,107,71,0.08);}
.p2-pill{color:var(--p2);border-color:var(--p2);background:rgba(232,255,71,0.06);}
.p3-pill{color:var(--p3);border-color:var(--p3);background:rgba(71,212,255,0.06);}
.p4-pill{color:var(--p4);border-color:var(--p4);background:rgba(180,124,255,0.06);}
.all-pill{color:#fff;border-color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.05);}

.header-right{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:3px;
}
.progress-pct{
  font-family:'JetBrains Mono',monospace;
  font-size:16px;
  font-weight:600;
  color:var(--p2);
  line-height:1;
}
.progress-bar-outer{
  width:110px;height:4px;
  background:rgba(255,255,255,0.08);
  border-radius:2px;overflow:hidden;
}
.progress-bar-inner{
  height:100%;
  background:linear-gradient(90deg,var(--p1),var(--p2));
  border-radius:2px;
  transition:width 0.7s ease;
}
.progress-label{
  font-family:'JetBrains Mono',monospace;
  font-size:8.5px;
  color:var(--muted);
  letter-spacing:0.3px;
}

/* ── LEGEND ── */
.legend-bar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  padding:6px 16px;
  background:rgba(255,255,255,0.015);
  border-bottom:1px solid var(--border);
  position:relative;z-index:1;
}
.legend-item{
  display:flex;align-items:center;gap:5px;
  font-size:10px;color:var(--muted2);
  white-space:nowrap;
}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

/* ── TODAY BANNER ── */
.today-banner{
  position:relative;z-index:1;
  margin:14px 14px 0;
  background:rgba(232,255,71,0.04);
  border:1px solid rgba(232,255,71,0.22);
  border-radius:var(--radius);
  padding:10px 14px;
  display:flex;align-items:center;gap:10px;
  cursor:pointer;
  transition:background 0.2s;
}
.today-banner:hover{background:rgba(232,255,71,0.08);}
.today-banner-pulse{
  width:9px;height:9px;border-radius:50%;
  background:var(--p2);flex-shrink:0;
  animation:pd 2s ease-in-out infinite;
}
@keyframes pd{
  0%,100%{box-shadow:0 0 0 0 rgba(232,255,71,0.6);}
  60%{box-shadow:0 0 0 8px rgba(232,255,71,0);}
}
.today-banner-label{
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;color:var(--p2);
  letter-spacing:0.5px;
  flex:1;min-width:0;
}
.today-banner-detail{
  font-size:10.5px;color:var(--muted2);
  white-space:nowrap;flex-shrink:0;
}

/* ── MAIN / CALENDAR ── */
.main{
  position:relative;z-index:1;
  padding:0 14px 100px;
  max-width:1140px;margin:0 auto;
}
.month-block{margin-top:28px;}
.month-header{
  display:flex;align-items:center;gap:10px;
  margin-bottom:8px;padding-left:2px;
}
.month-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;letter-spacing:2px;line-height:1;
}
.month-year{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;color:var(--muted);
}
.month-phase-tag{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;padding:2px 8px;
  border-radius:20px;border:1px solid;
  margin-left:auto;
}

/* ── GRID ── */
.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:3px;
}
.dow-label{
  text-align:center;
  font-family:'JetBrains Mono',monospace;
  font-size:9px;color:var(--muted);
  letter-spacing:0.8px;
  padding:4px 0 3px;
  background:rgba(255,255,255,0.02);
  border-radius:4px;
}

/* ── DAY CELLS ── */
.day-cell{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:7px 6px 7px;
  min-height:108px;
  cursor:pointer;
  transition:border-color 0.18s,transform 0.18s,box-shadow 0.18s;
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  gap:3px;
}
.day-cell:hover{
  border-color:var(--border2);
  transform:translateY(-2px);
  box-shadow:0 6px 24px rgba(0,0,0,0.4);
  z-index:2;
}
.day-cell.empty{
  background:transparent;
  border-color:transparent;
  cursor:default;
  pointer-events:none;
  min-height:unset;
}
.day-cell.past{opacity:0.32;}
.day-cell.rest-day    {border-left:3px solid #6b7280;}
.day-cell.cardio-day  {border-left:3px solid #34d399;}
.day-cell.strength-day{border-left:3px solid #fbbf24;}
.day-cell.kegel-day   {border-left:3px solid #a78bfa;}
.day-cell.hiit-day    {border-left:3px solid #f87171;}
.day-cell.recovery-day{border-left:3px solid #38bdf8;}
.day-cell.full-day    {border-left:3px solid #f472b6;}

.day-cell.today{
  border:2px solid rgba(232,255,71,0.8)!important;
  background:rgba(232,255,71,0.04)!important;
  animation:todayGlow 3s ease-in-out infinite;
  transform:scale(1.02);
  z-index:4;
}
@keyframes todayGlow{
  0%,100%{box-shadow:0 0 0 2px rgba(232,255,71,0.08),0 0 18px rgba(232,255,71,0.06);}
  50%{box-shadow:0 0 0 4px rgba(232,255,71,0.04),0 0 28px rgba(232,255,71,0.12);}
}

.day-header{
  display:flex;align-items:center;
  justify-content:space-between;
  min-height:16px;
}
.day-num{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;color:var(--muted);line-height:1;
}
.day-num.is-today{
  font-size:14px;font-weight:700;color:var(--p2);
}
.today-chip{
  font-family:'JetBrains Mono',monospace;
  font-size:7px;font-weight:700;letter-spacing:0.5px;
  color:#000;background:var(--p2);
  padding:2px 5px;border-radius:3px;
  line-height:1.4;white-space:nowrap;
}
.today-daynum{
  font-family:'JetBrains Mono',monospace;
  font-size:7.5px;color:rgba(232,255,71,0.5);
  letter-spacing:0.2px;line-height:1;margin-top:1px;
}

.day-badge{
  display:inline-flex;align-items:center;gap:3px;
  font-size:8px;
  font-family:'JetBrains Mono',monospace;
  font-weight:500;
  padding:2px 5px;border-radius:3px;
  letter-spacing:0.3px;text-transform:uppercase;
  align-self:flex-start;white-space:nowrap;
}
.day-tasks{
  display:flex;flex-direction:column;gap:2px;flex:1;
}
.task-item{
  font-size:10px;color:#9ca3af;
  line-height:1.35;
  display:flex;gap:4px;align-items:flex-start;
}
.task-dot{
  width:3px;height:3px;border-radius:50%;
  margin-top:4.5px;flex-shrink:0;
  background:currentColor;opacity:0.35;
}
.day-tip{
  font-size:8.5px;color:var(--muted);font-style:italic;
  line-height:1.4;
  border-top:1px solid rgba(255,255,255,0.05);
  padding-top:3px;margin-top:2px;
}

/* ── MODAL ── */
.modal-overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,0.82);
  z-index:300;
  align-items:center;justify-content:center;
  padding:16px;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}
.modal-overlay.open{display:flex;}
.modal{
  background:#10111e;
  border:1px solid var(--border2);
  border-radius:16px;
  width:100%;max-width:480px;
  padding:22px;
  position:relative;
  animation:popIn 0.18s ease;
  max-height:90vh;
  overflow-y:auto;
}
@keyframes popIn{
  from{transform:scale(0.92);opacity:0;}
  to{transform:scale(1);opacity:1;}
}
.modal-close{
  position:sticky;top:0;float:right;
  background:rgba(255,255,255,0.07);
  border:none;color:var(--muted2);
  width:28px;height:28px;border-radius:7px;
  cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  z-index:5;
}
.modal-close:hover{background:rgba(255,255,255,0.12);}
.modal-meta{
  font-family:'JetBrains Mono',monospace;
  font-size:9.5px;color:var(--muted);
  margin-bottom:4px;letter-spacing:0.5px;
}
.modal-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;letter-spacing:1px;margin-bottom:4px;
}
.modal-type{
  display:inline-flex;align-items:center;gap:4px;
  font-family:'JetBrains Mono',monospace;
  font-size:9.5px;padding:3px 10px;border-radius:4px;
  margin-bottom:14px;
}
.modal-stripe{height:2px;border-radius:2px;margin-bottom:16px;opacity:0.45;}
.modal-sec{
  font-size:9.5px;
  font-family:'JetBrains Mono',monospace;
  color:var(--muted);letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:10px;margin-top:14px;
}
.modal-tasks{display:flex;flex-direction:column;gap:10px;}
.modal-task{
  display:flex;align-items:flex-start;gap:10px;
  font-size:13px;line-height:1.6;
  padding:9px 11px;
  background:rgba(255,255,255,0.025);
  border:1px solid var(--border);
  border-radius:8px;
}
.modal-task-ic{font-size:16px;flex-shrink:0;width:22px;text-align:center;margin-top:1px;}
.modal-task-text{color:#c5c9d6;flex:1;}
.modal-tip{
  background:rgba(255,255,255,0.02);
  border:1px solid var(--border);
  border-radius:9px;
  padding:12px 14px;margin-top:14px;
  font-size:12.5px;color:var(--muted2);
  line-height:1.7;
}
.modal-tip strong{
  display:block;color:var(--text);
  margin-bottom:4px;
  font-size:9px;
  font-family:'JetBrains Mono',monospace;
  letter-spacing:1.5px;text-transform:uppercase;
}

/* ── FAB ── */
.fab{
  position:fixed;bottom:20px;right:16px;
  background:var(--p2);color:#000;border:none;
  padding:10px 16px;border-radius:9px;
  font-family:'JetBrains Mono',monospace;
  font-size:10px;font-weight:700;
  cursor:pointer;letter-spacing:1px;
  z-index:50;
  box-shadow:0 4px 20px rgba(232,255,71,0.32);
  transition:transform 0.18s,box-shadow 0.18s;
  white-space:nowrap;
}
.fab:hover{transform:scale(1.06);box-shadow:0 6px 28px rgba(232,255,71,0.42);}
.fab:active{transform:scale(0.97);}

/* ── MOBILE ── */
@media(max-width:640px){
  .app-header{
    grid-template-columns:auto auto;
    grid-template-rows:auto auto;
    gap:8px;
  }
  .app-title{font-size:18px;}
  .phase-pills{
    grid-column:1/-1;
    justify-content:flex-start;
    gap:3px;
  }
  .phase-pill{font-size:8px;padding:3px 7px;}
  .header-right{
    grid-row:1;
    grid-column:2;
    align-items:flex-end;
  }
  .progress-pct{font-size:14px;}
  .progress-bar-outer{width:90px;}

  .today-banner{flex-wrap:wrap;gap:7px;}
  .today-banner-detail{font-size:9.5px;}

  .dow-label{font-size:8px;letter-spacing:0.3px;padding:3px 0 2px;}

  .day-cell{
    min-height:72px;
    padding:5px 4px 5px;
    gap:2px;
  }
  .day-num{font-size:10px;}
  .day-num.is-today{font-size:12px;}
  .day-badge{font-size:7px;padding:2px 4px;}
  .task-item{font-size:8.5px;}
  .day-tip{display:none;}
  .today-chip{font-size:6.5px;padding:1px 4px;}

  .modal{padding:16px;}
  .modal-title{font-size:24px;}
  .modal-task{font-size:12px;padding:8px 10px;}

  .legend-bar{gap:7px;}
  .legend-item{font-size:9px;}
  .legend-dot{width:7px;height:7px;}

  .month-name{font-size:24px;}
  .calendar-grid{gap:2px;}
  .main{padding:0 10px 90px;}
}

@media(max-width:380px){
  .phase-pill{font-size:7.5px;padding:3px 6px;}
  .day-cell{min-height:62px;}
  .day-badge{display:none;}
  .dow-label{font-size:7.5px;}
}

@media(min-width:641px) and (max-width:900px){
  .app-header{
    grid-template-columns:auto 1fr auto;
  }
  .phase-pills{flex-wrap:nowrap;overflow-x:auto;}
}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title">STAMINA <span>2026</span></div>
  <div class="phase-pills">
    <div class="phase-pill all-pill active" onclick="filterPhase('all',this)">ALL</div>
    <div class="phase-pill p1-pill" onclick="filterPhase('p1',this)">🟠 FOUNDATION</div>
    <div class="phase-pill p2-pill" onclick="filterPhase('p2',this)">🟡 BREAKTHROUGH</div>
    <div class="phase-pill p3-pill" onclick="filterPhase('p3',this)">🔵 PEAK</div>
    <div class="phase-pill p4-pill" onclick="filterPhase('p4',this)">🟣 MASTERY</div>
  </div>
  <div class="header-right">
    <div class="progress-pct" id="progressPct">0%</div>
    <div class="progress-bar-outer"><div class="progress-bar-inner" id="progressBar" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">Loading...</div>
  </div>
</header>

<div class="legend-bar">
  <div class="legend-item"><div class="legend-dot" style="background:#34d399"></div>Cardio</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fbbf24"></div>Strength</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f87171"></div>HIIT</div>
  <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div>Kegel</div>
  <div class="legend-item"><div class="legend-dot" style="background:#38bdf8"></div>Recovery</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f472b6"></div>Full Body</div>
  <div class="legend-item"><div class="legend-dot" style="background:#6b7280"></div>Rest</div>
</div>

<div class="main" id="mainContent"></div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOvl(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-meta" id="mMeta"></div>
    <div class="modal-title" id="mTitle"></div>
    <div id="mBadge"></div>
    <div class="modal-stripe" id="mStripe"></div>
    <div class="modal-sec">Today's Training Tasks</div>
    <div class="modal-tasks" id="mTasks"></div>
    <div class="modal-tip" id="mTip"></div>
  </div>
</div>

<button class="fab" onclick="scrollToToday()">📍 TODAY</button>

<script>
// ── DYNAMIC DATES: always use real current date ──
const TODAY = new Date();
TODAY.setHours(0,0,0,0);
const START = new Date(2026,3,20); // April 20, 2026
START.setHours(0,0,0,0);

// ── WORKOUT TYPES ──
const T = {
  REST:     {label:'Rest Day',        icon:'😴', color:'#6b7280', bg:'rgba(107,114,128,0.12)', cls:'rest-day'},
  CARDIO:   {label:'Cardio Run',      icon:'🏃', color:'#34d399', bg:'rgba(52,211,153,0.12)',  cls:'cardio-day'},
  STRENGTH: {label:'Strength',        icon:'💪', color:'#fbbf24', bg:'rgba(251,191,36,0.12)',  cls:'strength-day'},
  KEGEL:    {label:'Kegel Focus',     icon:'🧘', color:'#a78bfa', bg:'rgba(167,139,250,0.12)', cls:'kegel-day'},
  HIIT:     {label:'HIIT',            icon:'⚡', color:'#f87171', bg:'rgba(248,113,113,0.12)', cls:'hiit-day'},
  RECOVERY: {label:'Active Recovery', icon:'💧', color:'#38bdf8', bg:'rgba(56,189,248,0.12)',  cls:'recovery-day'},
  FULL:     {label:'Full Body',       icon:'🔥', color:'#f472b6', bg:'rgba(244,114,182,0.12)', cls:'full-day'},
};

// ── WEEKLY PLANS ──
// Each day: [type, short[], detail[], tip]
// detail[] = full modal task list with clear instructions
function wp(w) {
  if (w===1) return [
    [T.CARDIO, ['Light jog 20 min at easy pace','Kegel holds 5s × 10 reps × 3 sets','Full-body stretch 10 min','Drink 2.5L water today'],
      ['🏃 Light jog 20 min — keep pace easy, you should be able to hold a conversation. No pressure to go fast today.',
       '🧘 Kegel holds: squeeze the pelvic floor muscles as if stopping urine flow. Hold 5 seconds, release 5 seconds. Do 10 reps × 3 sets with 60s rest between sets.',
       '🙆 Stretch full body after jogging: hip flexors, hamstrings, quads, calves — 30s each.',
       '💧 Drink 2.5 litres of water spread across the day — not all at once.'],
      'Day 1 — build the habit first, intensity comes later. Consistency over the next 36 weeks beats any single intense session.'],

    [T.STRENGTH, ['Plank 3 × 20s, rest 30s between','Bodyweight Squats 3 × 10 reps, slow and controlled','Push-ups 3 × 10 reps, full range','Hip Thrusts 3 × 10 reps with 2s squeeze at top','Kegel holds 5s × 10 × 3'],
      ['🏋️ Plank: hold body straight from head to heels, core tight, no sagging. 3 sets × 20 seconds. Rest 30 seconds between sets.',
       '🦵 Squats: feet shoulder-width, toes slightly out. Lower until thighs are parallel, drive back up. 3 sets × 10 reps slow and controlled.',
       '💪 Push-ups: hands slightly wider than shoulders, lower chest to 1 inch above floor, push all the way up. Modify on knees if needed. 3 × 10.',
       '🍑 Hip Thrusts: lie on your back, feet flat, knees bent. Drive hips up squeezing glutes hard at top for 2 seconds. 3 × 10 reps.',
       '🧘 Finish with Kegel holds 5s × 10 reps × 3 sets as a cool-down.'],
      'Slow, controlled squats recruit far more muscle than fast sloppy reps. Take 3 seconds going down, 2 seconds coming back up.'],

    [T.CARDIO, ['Jog 20 min at comfortable pace','Kegel 5s × 12 reps × 3 sets','5 min brisk walking cool-down','High-protein dinner tonight'],
      ['🏃 Jog 20 min — same easy conversational pace as Day 1. Focus on breathing through your nose for the first 10 minutes.',
       '🧘 Kegel: 5s hold, 5s release × 12 reps × 3 sets. Try doing this standing up today for added challenge.',
       '🚶 After jogging: 5 minutes slow walking to bring heart rate down before stretching calves and hamstrings.',
       '🥩 Aim for at least 30g of protein at dinner — eggs, chicken, fish, or beans all count.'],
      '3 cardio sessions per week is the minimum threshold for real cardiovascular improvement. Hit all 3 every week.'],

       '💬 Energy strategy: rounds 1–2 at 70% effort (controlled, smooth), rounds 3–4 at 85%, round 5 at full effort. Practice pacing this way — not going 100% from the start.',

    [T.FULL, ['Run 55 min','Elite circuit × 5 rounds: 25 squats + 25 push-ups + 25 hip thrusts + 90s plank','Attempt 5 rounds tonight'],

       '⚡ Elite circuit × 5 rounds, 90s rest between:\n  → 25 squats\n  → 25 push-ups\n  → 25 hip thrusts (3s hold at top)\n  → 90s plank',
       '🎯 TONIGHT: attempt all 5 rounds with your partner. Use 70-85-100% pacing strategy. Breathe through your nose. Apply 4-7-8 between rounds.',
       '📝 Track: did you complete 5 rounds? How did energy hold across rounds? What changes next time?'],
      '🔥 Go for 5 rounds tonight. Your body has been built for this exact performance over 4+ months. Execute.'],

    [T.RECOVERY, ['Long swim or run 60 min','Kegel 15s × 20 × 3','Yoga 30 min hip focus','Foam rolling 15 min'],
      ['🏊 Swim 60 min OR run 60 min. This is an active recovery-quality session, not a race.',
       '🧘 Kegel 15s × 20 × 3 during cool-down.',
       '🧘 Yoga 30 min: deep hip-focused session — 90-90, pigeon, figure-4, happy baby. Hold each 90s minimum.',

      'Phase 3 weekend training is at a level that would impress professional athletes. Train and eat like an athlete every single day now.'],

    [T.REST, ['Full rest','9 hours sleep','Identify what gives out first','Set Phase 3 performance benchmarks'],
      ['😴 9 hrs sleep — peak performance recovery requires more sleep than base training.',
       '📊 Analyze: in your 5-round attempts, what fails first? Cardiovascular endurance? Muscular strength? Focus and mindset? Identify specifically.',
       '🧠 Set benchmarks: write target numbers for the next 3 weeks. How many rounds? What heart rate at 30 min of running?',
       '💧 3L water, clean nutrition, no alcohol.'],
      'Precisely identifying your performance limiter allows targeted training focus. Cardio limit → more HIIT. Strength limit → more sets. Mindset limit → visualization.'],
  ];

  // Weeks 28–36: Mastery Phase
  return [
    [T.HIIT, ['Maintenance HIIT 35 min — 50s sprint / 10s rest','Kegel 15s × 20 × 3','Cold shower'],
      ['⚡ Maintenance HIIT 35 min: 50s sprint at ~80% effort, 10s rest. Sustainable but challenging. 70% of peak volume.',
       '📊 Track your interval count. You should be hitting 15+ clean high-intensity intervals consistently now.',
       '🧘 Kegel 15s × 20 × 3 post-HIIT.',
       '🚿 Cold shower 90s. This is now a standard practice for you.'],

    [T.STRENGTH, ['Squats 4 × 15 reps','Hip Thrusts 4 × 15 with 2s hold','Push-ups 4 × 18','Plank 4 × 75s','Kegel 15s × 20 × 3'],
      ['🦵 Squats 4 × 15: maintenance volume. Add weight if you haven\'t been — bodyweight squats should feel very easy now.',
       '🍑 Hip thrusts 4 × 15 with 2s hold: never drop these. They are your most direct performance trainer.',

    [T.FULL, ['Run 45 min','Maintenance circuit × 4: 20 squats + 20 push-ups + 20 hip thrusts + 75s plank','Kegel 15s × 15 × 3'],
      ['🏃 Run 45 min — comfortable, enjoyable pace.',
       '⚡ Maintenance circuit × 4 rounds, 90s rest:\n  → 20 squats\n  → 20 push-ups\n  → 20 hip thrusts (2s hold)\n  → 75s plank',
       '🧘 Kegel 15s × 15 × 3 to close.',
       '🎉 This session represents 7+ months of committed training. You are now one of the fittest people in your social circle. Be proud of that.'],

    [T.CARDIO, ['Fun physical activity 45 min — football, badminton, swimming, dancing','Kegel 15s × 20 × 3','Yoga 20 min'],
      ['🎮 Choose your favourite physical activity: five-a-side football, badminton, swimming, dancing, cycling with a friend — anything active that feels like fun.',
       '📊 45 min of active movement. This is your "free play" session — no structure needed.',
       '🧘 Kegel 15s × 20 × 3 after.',
       '🧘 Yoga 20 min to close the week.'],

    [T.REST, ['Full rest','9 hrs quality sleep','Quality time with partner','Celebrate — you did it'],
      ['😴 9 hrs sleep.',
       '💑 Quality, unhurried time with your partner. This is the goal you worked for 7+ months to achieve.',
       '🎉 Celebrate genuinely: you went from 20-minute jogs to 1-hour runs. From struggling to 1 round to 5 full rounds. This is extraordinary.',
       '📓 Write a final note to yourself: who you were on Day 1 vs who you are now. Keep it. Read it in a year.'],

function getPhase(w){
  if(w<=8)  return {id:'p1', color:'#ff6b47', label:'Foundation'};
  if(w<=18) return {id:'p2', color:'#e8ff47', label:'Breakthrough'};
  if(w<=27) return {id:'p3', color:'#47d4ff', label:'Peak'};
  return          {id:'p4', color:'#b47cff', label:'Mastery'};
}

// ── BUILD DAY MAP ──
const dayMap = {};
const scheduleEnd = new Date(2026, 11, 31);
scheduleEnd.setHours(0,0,0,0);

let cur = new Date(START), dow = 0, wk = 1;
while(cur <= scheduleEnd){
  const plan = wp(wk);
  const d = dow % 7;
  const [type, short, detail, tip] = plan[d];
  const k = cur.getFullYear()+'-'+cur.getMonth()+'-'+cur.getDate();
  dayMap[k] = {date: new Date(cur), type, short, detail, tip, week:wk, phase:getPhase(wk), dow:d};
  cur.setDate(cur.getDate()+1);
  dow++;
  if(dow % 7 === 0) wk++;
  if(wk > 36) wk = 36;
}

// Total scheduled days
const ALL_DAYS = Object.keys(dayMap);
const TOTAL = ALL_DAYS.length;

const MN = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DN = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DNF = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

function dk(d){ return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate(); }
function isToday(d){ return dk(d)===dk(TODAY); }
function isPast(d){ return d>=START && d<TODAY && !isToday(d); }

// Dynamic day number from START
function dayNum(d){
  const diff = Math.floor((d - START) / 86400000) + 1;
  return diff;
}

// ── DYNAMIC PROGRESS: count days elapsed from START to TODAY ──
function updateProgress(){
  const todayKey = dk(TODAY);
  const startKey = dk(START);

  // Count how many scheduled days have passed (including today)
  let elapsed = 0;
  ALL_DAYS.forEach(k => {
    const d = dayMap[k].date;
    if(d <= TODAY) elapsed++;
  });

  const pct = Math.round((elapsed / TOTAL) * 100);
  const clamped = Math.max(0, Math.min(pct, 100));

  document.getElementById('progressBar').style.width = clamped + '%';
  document.getElementById('progressPct').textContent = clamped + '%';

  // Show current day number if we're within the schedule
  if(TODAY >= START && TODAY <= scheduleEnd && dayMap[todayKey]){
    const dn = dayNum(TODAY);
    document.getElementById('progressLabel').textContent = 'Day ' + dn + ' of ' + TOTAL;
  } else if(TODAY < START){
    document.getElementById('progressLabel').textContent = 'Starts Apr 20, 2026';
    document.getElementById('progressPct').textContent = '0%';
    document.getElementById('progressBar').style.width = '0%';
  } else {
    document.getElementById('progressLabel').textContent = 'Schedule Complete!';
  }
}

// ── RENDER ──
function renderCalendar(filter){
  filter = filter || 'all';
  const cont = document.getElementById('mainContent');
  cont.innerHTML = '';

  // Today banner
  const todayKey = dk(TODAY);
  if(dayMap[todayKey]){
    const td = dayMap[todayKey];
    const b = document.createElement('div');
    b.className = 'today-banner';
    b.onclick = scrollToToday;
    b.innerHTML =
      '<div class="today-banner-pulse"></div>' +
      '<div class="today-banner-label">' + DNF[td.dow] + ', ' + MN[TODAY.getMonth()] + ' ' + TODAY.getDate() + ' — Day ' + dayNum(TODAY) + ' of ' + TOTAL + '</div>' +
      '<div class="today-banner-detail">' + td.type.icon + ' ' + td.type.label + ' · ' + td.phase.label + ' ↓</div>';
    cont.appendChild(b);
  }

  // Determine month range
  const startMonth = START.getMonth(); // 3 = April
  const startYear = START.getFullYear(); // 2026
  const endMonth = scheduleEnd.getMonth(); // 11 = December
  const endYear = scheduleEnd.getFullYear(); // 2026

  for(let month = startMonth; month <= endMonth; month++){
    const firstDay = new Date(startYear, month, 1);
    const lastDay = new Date(startYear, month + 1, 0);

    const blk = document.createElement('div');
    blk.className = 'month-block';
    blk.id = 'month-' + month;

    // Find phase color for this month
    let dp = null;
    for(let dd = 1; dd <= lastDay.getDate(); dd++){
      const kk = dk(new Date(startYear, month, dd));
      if(dayMap[kk]){ dp = dayMap[kk].phase; break; }
    }
    const pc = dp ? dp.color : '#fff';

    const hdr = document.createElement('div');
    hdr.className = 'month-header';
    hdr.innerHTML =
      '<div class="month-name" style="color:'+pc+'">'+MN[month]+'</div>' +
      '<div class="month-year">'+startYear+'</div>' +
      (dp ? '<div class="month-phase-tag" style="color:'+pc+';border-color:'+pc+';background:'+pc+'18">'+dp.label+'</div>' : '');
    blk.appendChild(hdr);

    const grid = document.createElement('div');
    grid.className = 'calendar-grid';

    // DOW headers
    DN.forEach(n => {
      const l = document.createElement('div');
      l.className = 'dow-label';
      l.textContent = n;
      grid.appendChild(l);
    });

    // Offset blank cells (Monday-based week)
    const offset = (firstDay.getDay() + 6) % 7;
    for(let i = 0; i < offset; i++){
      const blank = document.createElement('div');
      blank.className = 'day-cell empty';
      grid.appendChild(blank);
    }

    // Day cells
    for(let dd = 1; dd <= lastDay.getDate(); dd++){
      const dt = new Date(startYear, month, dd);
      const k2 = dk(dt);
      const data = dayMap[k2];
      const cell = document.createElement('div');

      if(!data){
        cell.className = 'day-cell empty';
      } else {
        const show = (filter === 'all') || (data.phase.id === filter);
        if(!show){ cell.className = 'day-cell empty'; grid.appendChild(cell); continue; }

        const tod = isToday(dt);
        const past = isPast(dt);
        cell.className = 'day-cell ' + data.type.cls + (tod ? ' today' : '') + (past ? ' past' : '');
        if(tod) cell.id = 'today-cell';

        const tasksHtml = data.short.slice(0, 3).map(t =>
          '<div class="task-item"><span class="task-dot"></span>' + t + '</div>'
        ).join('');

        if(tod){
          cell.innerHTML =
            '<div class="day-header">' +
              '<span class="day-num is-today">' + dt.getDate() + '</span>' +
              '<span class="today-chip">TODAY</span>' +
            '</div>' +
            '<div class="today-daynum">Day ' + dayNum(dt) + ' of ' + TOTAL + '</div>' +
            '<div class="day-badge" style="background:'+data.type.bg+';color:'+data.type.color+'">'+data.type.icon+' '+data.type.label+'</div>' +
            '<div class="day-tasks">' + tasksHtml + '</div>';
        } else {
          cell.innerHTML =
            '<div class="day-header">' +
              '<span class="day-num">' + dt.getDate() + '</span>' +
            '</div>' +
            '<div class="day-badge" style="background:'+data.type.bg+';color:'+data.type.color+'">'+data.type.icon+' '+data.type.label+'</div>' +
            '<div class="day-tasks">' + tasksHtml + '</div>' +
            '<div class="day-tip">' + data.tip.substring(0, 65) + '…</div>';
        }

        cell.addEventListener('click', (function(d2, data2){ return function(){ openModal(data2, d2); }; })(dt, data));
      }
      grid.appendChild(cell);
    }

    // Trailing blanks
    const total_cells = offset + lastDay.getDate();
    const trailing = (7 - (total_cells % 7)) % 7;
    for(let i = 0; i < trailing; i++){
      const blank = document.createElement('div');
      blank.className = 'day-cell empty';
      grid.appendChild(blank);
    }

    blk.appendChild(grid);
    cont.appendChild(blk);
  }

  updateProgress();
}

function openModal(data, dt){
  document.getElementById('mMeta').textContent =
    DNF[data.dow] + ', ' + MN[dt.getMonth()] + ' ' + dt.getDate() + ', 2026  ·  Week ' + data.week + '  ·  Day ' + dayNum(dt) + ' of ' + TOTAL;
  document.getElementById('mTitle').textContent = data.type.label;
  document.getElementById('mBadge').innerHTML =
    '<div class="modal-type" style="background:'+data.type.bg+';color:'+data.type.color+'">' +
    data.type.icon + ' ' + data.type.label + ' · ' + data.phase.label + '</div>';
  document.getElementById('mStripe').style.background =
    'linear-gradient(90deg,' + data.phase.color + ',' + data.type.color + ')';

  document.getElementById('mTasks').innerHTML = data.detail.map(t => {
    const ic = t.substring(0, 2);
    const txt = t.substring(2).replace(/\n/g, '<br>');
    return '<div class="modal-task"><span class="modal-task-ic">'+ic+'</span><span class="modal-task-text">'+txt+'</span></div>';
  }).join('');

  document.getElementById('mTip').innerHTML = '<strong>Coach\'s Tip</strong>' + data.tip;
  document.getElementById('modalOverlay').classList.add('open');
  // Prevent body scroll when modal open
  document.body.style.overflow = 'hidden';
}

function closeModalOvl(e){
  if(e.target === document.getElementById('modalOverlay')) closeModal();
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// Close modal on Escape key
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });

function filterPhase(phase, el){
  document.querySelectorAll('.phase-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderCalendar(phase);
  // After re-render, scroll to today
  setTimeout(scrollToToday, 100);
}

function scrollToToday(){
  const el = document.getElementById('today-cell');
  if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
}

// Init
renderCalendar('all');
setTimeout(scrollToToday, 400);
</script>
