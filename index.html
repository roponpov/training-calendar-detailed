<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stamina Training Calendar 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07080f;
  --surface: #0e0f1a;
  --card: #13152200;
  --card-solid: #131522;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --text: #eef0f8;
  --muted: #6b7280;
  --muted2: #9ca3af;

  --rest:    #1e2030;
  --rest-t:  #6b7280;
  --cardio:  #0f2a1a;
  --cardio-t:#34d399;
  --strength:#1a1a0f;
  --strength-t:#fbbf24;
  --kegel:   #1a0f2a;
  --kegel-t: #a78bfa;
  --hiit:    #2a0f0f;
  --hiit-t:  #f87171;
  --recovery:#0f1f2a;
  --recovery-t:#38bdf8;
  --full:    #1a0f1a;
  --full-t:  #f472b6;

  --p1: #ff6b47;
  --p2: #e8ff47;
  --p3: #47d4ff;
  --p4: #b47cff;

  --today-glow: rgba(232,255,71,0.15);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
}

/* BG effect */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 5%, rgba(255,107,71,0.05) 0%, transparent 50%),
    radial-gradient(ellipse 60% 60% at 85% 95%, rgba(71,212,255,0.04) 0%, transparent 50%);
  pointer-events:none;
  z-index:0;
}

/* ── HEADER ── */
.app-header {
  position:sticky;
  top:0;
  z-index:100;
  background: rgba(7,8,15,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display:flex;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
}

.app-title {
  font-family:'Bebas Neue', sans-serif;
  font-size:22px;
  letter-spacing:2px;
  white-space:nowrap;
}

.app-title span { color: var(--p2); }

.phase-pills {
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.phase-pill {
  font-family:'JetBrains Mono', monospace;
  font-size:10px;
  padding:4px 10px;
  border-radius:20px;
  border:1px solid;
  cursor:pointer;
  transition: all 0.2s;
  white-space:nowrap;
}

.phase-pill:hover, .phase-pill.active { opacity:1; transform:scale(1.05); }
.phase-pill:not(.active) { opacity:0.4; }

.p1-pill { color:var(--p1); border-color:var(--p1); background:rgba(255,107,71,0.08); }
.p2-pill { color:var(--p2); border-color:var(--p2); background:rgba(232,255,71,0.06); }
.p3-pill { color:var(--p3); border-color:var(--p3); background:rgba(71,212,255,0.06); }
.p4-pill { color:var(--p4); border-color:var(--p4); background:rgba(180,124,255,0.06); }
.all-pill { color:#fff;    border-color:#444;      background:rgba(255,255,255,0.04); }

.header-right {
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:10px;
}

.progress-wrap {
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:4px;
}

.progress-bar-outer {
  width:120px;
  height:4px;
  background:rgba(255,255,255,0.08);
  border-radius:2px;
  overflow:hidden;
}

.progress-bar-inner {
  height:100%;
  background: linear-gradient(90deg, var(--p1), var(--p2));
  border-radius:2px;
  transition: width 0.5s ease;
}

.progress-label {
  font-family:'JetBrains Mono', monospace;
  font-size:9px;
  color:var(--muted);
}

/* ── LEGEND ── */
.legend-bar {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  padding:10px 24px;
  background: rgba(255,255,255,0.015);
  border-bottom:1px solid var(--border);
  position:relative;
  z-index:1;
}

.legend-item {
  display:flex;
  align-items:center;
  gap:5px;
  font-size:11px;
  color:var(--muted2);
}

.legend-dot {
  width:8px;
  height:8px;
  border-radius:2px;
  flex-shrink:0;
}

/* ── MAIN ── */
.main {
  position:relative;
  z-index:1;
  padding:0 16px 80px;
  max-width:1100px;
  margin:0 auto;
}

/* ── MONTH BLOCK ── */
.month-block {
  margin-top:40px;
}

.month-header {
  display:flex;
  align-items:baseline;
  gap:14px;
  margin-bottom:16px;
  padding-left:4px;
}

.month-name {
  font-family:'Bebas Neue', sans-serif;
  font-size:36px;
  letter-spacing:2px;
  line-height:1;
}

.month-year {
  font-family:'JetBrains Mono', monospace;
  font-size:12px;
  color:var(--muted);
}

.month-phase-tag {
  font-family:'JetBrains Mono', monospace;
  font-size:10px;
  padding:3px 10px;
  border-radius:20px;
  border:1px solid;
  margin-left:auto;
}

/* ── WEEK ROWS ── */
.week-row {
  display:grid;
  grid-template-columns: repeat(7, 1fr);
  gap:4px;
  margin-bottom:4px;
}

.dow-header {
  display:grid;
  grid-template-columns: repeat(7, 1fr);
  gap:4px;
  margin-bottom:6px;
}

.dow-label {
  text-align:center;
  font-family:'JetBrains Mono', monospace;
  font-size:9px;
  color:var(--muted);
  letter-spacing:1.5px;
  padding:4px 0;
  text-transform:uppercase;
}

/* ── DAY CELL ── */
.day-cell {
  background: var(--card-solid);
  border: 1px solid var(--border);
  border-radius:8px;
  padding:8px 9px 10px;
  min-height:110px;
  cursor:pointer;
  transition: all 0.2s;
  position:relative;
  overflow:hidden;
}

.day-cell:hover {
  border-color: var(--border2);
  transform: translateY(-1px);
  z-index:2;
}

.day-cell.empty {
  background: transparent;
  border-color: transparent;
  cursor:default;
  pointer-events:none;
}

.day-cell.today {
  border-color: rgba(232,255,71,0.5) !important;
  background: rgba(232,255,71,0.04) !important;
  box-shadow: 0 0 16px rgba(232,255,71,0.07);
}

.day-cell.past {
  opacity:0.45;
}

.day-cell.rest-day { border-left: 2px solid var(--rest-t); }
.day-cell.cardio-day { border-left: 2px solid var(--cardio-t); }
.day-cell.strength-day { border-left: 2px solid var(--strength-t); }
.day-cell.kegel-day { border-left: 2px solid var(--kegel-t); }
.day-cell.hiit-day { border-left: 2px solid var(--hiit-t); }
.day-cell.recovery-day { border-left: 2px solid var(--recovery-t); }
.day-cell.full-day { border-left: 2px solid var(--full-t); }

.day-num {
  font-family:'JetBrains Mono', monospace;
  font-size:11px;
  color:var(--muted);
  margin-bottom:5px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.today-dot {
  width:5px;
  height:5px;
  background:var(--p2);
  border-radius:50%;
}

.day-type-badge {
  display:inline-flex;
  align-items:center;
  gap:3px;
  font-size:9px;
  font-family:'JetBrains Mono', monospace;
  font-weight:500;
  padding:2px 6px;
  border-radius:3px;
  margin-bottom:6px;
  letter-spacing:0.5px;
  text-transform:uppercase;
}

.day-tasks {
  display:flex;
  flex-direction:column;
  gap:3px;
}

.task-item {
  font-size:10.5px;
  color:#bbb;
  line-height:1.35;
  display:flex;
  gap:5px;
  align-items:flex-start;
}

.task-item .dot {
  width:3px;
  height:3px;
  border-radius:50%;
  margin-top:5px;
  flex-shrink:0;
  background:currentColor;
  opacity:0.5;
}

.day-tip {
  margin-top:6px;
  font-size:9.5px;
  color:var(--muted);
  font-style:italic;
  line-height:1.4;
  border-top:1px solid var(--border);
  padding-top:5px;
}

/* ── MODAL ── */
.modal-overlay {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  z-index:200;
  align-items:center;
  justify-content:center;
  padding:20px;
  backdrop-filter:blur(4px);
}

.modal-overlay.open { display:flex; }

.modal {
  background:#12131f;
  border:1px solid var(--border2);
  border-radius:16px;
  width:100%;
  max-width:480px;
  padding:28px;
  position:relative;
  animation: popIn 0.2s ease;
}

@keyframes popIn {
  from { transform:scale(0.92); opacity:0; }
  to   { transform:scale(1);    opacity:1; }
}

.modal-close {
  position:absolute;
  top:16px; right:16px;
  background:rgba(255,255,255,0.06);
  border:none;
  color:var(--muted2);
  width:28px; height:28px;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-date {
  font-family:'JetBrains Mono', monospace;
  font-size:11px;
  color:var(--muted);
  margin-bottom:6px;
  letter-spacing:1px;
}

.modal-title {
  font-family:'Bebas Neue', sans-serif;
  font-size:28px;
  letter-spacing:1px;
  margin-bottom:4px;
}

.modal-type {
  display:inline-flex;
  align-items:center;
  gap:4px;
  font-family:'JetBrains Mono', monospace;
  font-size:10px;
  padding:3px 10px;
  border-radius:4px;
  margin-bottom:20px;
}

.modal-section-title {
  font-size:11px;
  font-family:'JetBrains Mono', monospace;
  color:var(--muted);
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:10px;
  margin-top:18px;
}

.modal-tasks {
  display:flex;
  flex-direction:column;
  gap:8px;
}

.modal-task {
  display:flex;
  align-items:flex-start;
  gap:10px;
  font-size:14px;
  line-height:1.5;
}

.modal-task-icon {
  font-size:16px;
  flex-shrink:0;
  width:22px;
  text-align:center;
}

.modal-tip-box {
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  border-radius:8px;
  padding:12px 14px;
  margin-top:16px;
  font-size:12.5px;
  color:var(--muted2);
  line-height:1.6;
}

.modal-tip-box strong {
  display:block;
  color:var(--text);
  margin-bottom:4px;
  font-size:11px;
  font-family:'JetBrains Mono', monospace;
  letter-spacing:1px;
  text-transform:uppercase;
}

/* phase stripe */
.phase-stripe {
  height:3px;
  border-radius:2px;
  margin-bottom:16px;
  opacity:0.6;
}

/* SCROLL TO TODAY */
.scroll-today-btn {
  position:fixed;
  bottom:28px;
  right:24px;
  background:var(--p2);
  color:#000;
  border:none;
  padding:10px 18px;
  border-radius:8px;
  font-family:'JetBrains Mono', monospace;
  font-size:11px;
  font-weight:600;
  cursor:pointer;
  letter-spacing:1px;
  z-index:50;
  box-shadow:0 4px 20px rgba(232,255,71,0.3);
  transition:transform 0.2s;
}
.scroll-today-btn:hover { transform:scale(1.05); }

@media (max-width:600px) {
  .day-cell { min-height:70px; padding:5px 5px 7px; }
  .task-item { font-size:9px; }
  .day-tip { display:none; }
  .app-title { font-size:18px; }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title">STAMINA <span>2026</span></div>
  <div class="phase-pills">
    <div class="phase-pill all-pill active" onclick="filterPhase('all',this)">ALL</div>
    <div class="phase-pill p1-pill" onclick="filterPhase('p1',this)">🟠 FOUNDATION</div>
    <div class="phase-pill p2-pill" onclick="filterPhase('p2',this)">🟡 BREAKTHROUGH</div>
    <div class="phase-pill p3-pill" onclick="filterPhase('p3',this)">🔵 PEAK</div>
    <div class="phase-pill p4-pill" onclick="filterPhase('p4',this)">🟣 MASTERY</div>
  </div>
  <div class="header-right">
    <div class="progress-wrap">
      <div class="progress-bar-outer"><div class="progress-bar-inner" id="progressBar" style="width:0%"></div></div>
      <div class="progress-label" id="progressLabel">0 / 255 days</div>
    </div>
  </div>
</header>

<div class="legend-bar">
  <div class="legend-item"><div class="legend-dot" style="background:#34d399"></div>Cardio Run</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fbbf24"></div>Strength</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f87171"></div>HIIT</div>
  <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div>Kegel Focus</div>
  <div class="legend-item"><div class="legend-dot" style="background:#38bdf8"></div>Active Recovery</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f472b6"></div>Full Body</div>
  <div class="legend-item"><div class="legend-dot" style="background:#6b7280"></div>Rest</div>
</div>

<div class="main" id="mainContent"></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <button class="modal-close" onclick="closeModalBtn()">✕</button>
    <div class="modal-date" id="mDate"></div>
    <div class="modal-title" id="mTitle"></div>
    <div id="mTypeBadge"></div>
    <div class="phase-stripe" id="mStripe"></div>
    <div class="modal-section-title">TODAY'S TASKS</div>
    <div class="modal-tasks" id="mTasks"></div>
    <div class="modal-tip-box" id="mTip"></div>
  </div>
</div>

<button class="scroll-today-btn" onclick="scrollToToday()">→ TODAY</button>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────

const TODAY = new Date(2026, 3, 20); // Apr 20, 2026

// Workout types
const T = {
  REST:     { key:'rest',     label:'REST DAY',       icon:'😴', color:'#6b7280', bg:'rgba(107,114,128,0.1)',  cls:'rest-day' },
  CARDIO:   { key:'cardio',   label:'CARDIO RUN',     icon:'🏃', color:'#34d399', bg:'rgba(52,211,153,0.1)',  cls:'cardio-day' },
  STRENGTH: { key:'strength', label:'STRENGTH',       icon:'💪', color:'#fbbf24', bg:'rgba(251,191,36,0.1)',  cls:'strength-day' },
  KEGEL:    { key:'kegel',    label:'KEGEL FOCUS',    icon:'🧘', color:'#a78bfa', bg:'rgba(167,139,250,0.1)', cls:'kegel-day' },
  HIIT:     { key:'hiit',     label:'HIIT',           icon:'⚡', color:'#f87171', bg:'rgba(248,113,113,0.1)', cls:'hiit-day' },
  RECOVERY: { key:'recovery', label:'ACTIVE RECOVERY',icon:'🔵', color:'#38bdf8', bg:'rgba(56,189,248,0.1)', cls:'recovery-day' },
  FULL:     { key:'full',     label:'FULL BODY',      icon:'🔥', color:'#f472b6', bg:'rgba(244,114,182,0.1)', cls:'full-day' },
};

// Phase config
const PHASES = {
  p1: { label:'PHASE 1 — FOUNDATION',    color:'#ff6b47', weeks:[1,8]  },
  p2: { label:'PHASE 2 — BREAKTHROUGH',  color:'#e8ff47', weeks:[9,18] },
  p3: { label:'PHASE 3 — PEAK',          color:'#47d4ff', weeks:[19,27]},
  p4: { label:'PHASE 4 — MASTERY',       color:'#b47cff', weeks:[28,36]},
};

// Full schedule: for each week number (1-36), define a 7-day pattern
// Each day: [type, shortTasks[], detailTasks[], tip]
// DOW: 0=Mon,1=Tue,2=Wed,3=Thu,4=Fri,5=Sat,6=Sun

function getWeekPlan(week) {
  // PHASE 1: FOUNDATION (weeks 1-8)
  if (week === 1) return [
    [T.CARDIO,   ['Light jog 20 min','Kegel 5s×10 reps×3 sets','Stretch 10 min'],
                 ['🏃 Light jog or brisk walk 20 minutes at easy pace','🧘 Kegel exercise: squeeze 5 sec, release 5 sec × 10 reps × 3 sets','🙆 Full body stretch 10 min after cardio','💧 Drink 2.5L water today'],
                 'First day — don\'t push hard. This week is about establishing habits, not breaking records.'],
    [T.STRENGTH, ['Plank 3×20s','Squats 3×10','Push-ups 3×10','Hip thrusts 3×10'],
                 ['🏋️ Plank hold: 3 sets of 20 seconds','🦵 Bodyweight squats: 3 sets × 10 reps','💪 Push-ups: 3 sets × 10 reps (knees OK)','🍑 Hip thrusts: 3 sets × 10 reps','🧘 Kegel 5s×10×3 (daily habit)'],
                 'Focus on form, not speed. Slow squats build more muscle than fast sloppy ones.'],
    [T.CARDIO,   ['Jog 20 min','Kegel 5s×12 reps','Cool-down walk'],
                 ['🏃 Jog 20 minutes steady pace','🧘 Kegel: 5s holds × 12 reps × 3 sets','🚶 5 min cool-down walk','🥗 Eat a protein-rich dinner tonight'],
                 'Your body needs consistent cardio signals. 3× per week at minimum for real gains.'],
    [T.KEGEL,    ['Kegel 5s×15 reps×4 sets','Deep breathing 10 min','Stretch hips'],
                 ['🧘 Kegel holds: 5 sec × 15 reps × 4 sets (morning + evening)','🌬️ Deep diaphragmatic breathing: 10 minutes','🦵 Hip flexor stretch: 2 min each side','🧠 Mindfulness: sit quietly 5 min, notice your breath'],
                 'Kegel muscles are your secret weapon — they directly control stamina and recovery between rounds.'],
    [T.FULL,     ['Jog 20 min','Squats 3×12','Plank 3×25s','Push-ups 3×12'],
                 ['🏃 Jog 20 minutes','🦵 Squats 3×12 reps','🏋️ Plank 3×25 seconds','💪 Push-ups 3×12 reps','🍑 Glute bridges 3×12 reps','💧 3L water today'],
                 'Friday full-body sessions prime your body for weekend. Eat well tonight.'],
    [T.CARDIO,   ['Long walk 30–40 min','Kegel in morning','Light stretching'],
                 ['🚶 Long walk 30–40 minutes in nature or park','🧘 Kegel morning routine: 5s×15×3','🙆 Full body stretching 15 minutes','🥑 Focus on nutritious eating all day'],
                 'Weekend cardio can be enjoyable — walk in a park, explore your area. Movement doesn\'t have to be gym.'],
    [T.REST,     ['Rest & recover','Sleep 8+ hrs','Meal prep for week'],
                 ['😴 Prioritize 8–9 hours sleep tonight','🥗 Meal prep healthy proteins for the week','🛁 Epsom salt bath or hot shower to relax muscles','📓 Journal: write down your week 1 observations'],
                 'Rest is when your body actually builds strength. Never skip Sunday rest in Phase 1.'],
  ];

  if (week === 2) return [
    [T.CARDIO,   ['Jog 25 min','Kegel 7s×10×3','Stretch'],
                 ['🏃 Jog 25 minutes — slightly faster than last week','🧘 Kegel: increase to 7 second holds × 10 reps × 3 sets','🙆 10 min stretch after','💧 2.5L water — track it'],
                 'Each week add 5 minutes to your run. Gradual progression prevents injury and burns out enthusiasm.'],
    [T.STRENGTH, ['Plank 3×30s','Squats 3×12','Hip thrusts 3×12','Push-ups 3×12'],
                 ['🏋️ Plank 3×30 seconds (up from 20s)','🦵 Squats 3×12 reps','🍑 Hip thrusts 3×12 reps — squeeze glutes at top','💪 Push-ups 3×12 reps','🧘 Kegel 7s×10×3'],
                 'Hip thrusts are critical — they directly strengthen the muscles used most during intimacy.'],
    [T.CARDIO,   ['Jog 25 min','Kegel 7s×12×3','Cool-down'],
                 ['🏃 Jog 25 minutes — same pace as Monday','🧘 Kegel 7s holds × 12 reps × 3 sets','🚶 5 min cool-down walk','🥩 Protein meal within 30 min of exercise'],
                 'Post-workout protein window: eat within 30 minutes. Eggs, chicken, or a protein shake.'],
    [T.KEGEL,    ['Kegel 7s×15×4','Breathing 10 min','Core stretch'],
                 ['🧘 Advanced kegel: 7s hold + 3s release × 15 reps × 4 sets','🌬️ Box breathing: inhale 4s, hold 4s, exhale 4s × 10 rounds','🦵 Deep core stretch: cat-cow, child pose, cobra','🚫 No alcohol this week'],
                 'Box breathing reduces cortisol (stress hormone) which directly sabotages stamina. Practice daily.'],
    [T.FULL,     ['Jog 25 min','Circuit: squats+push-ups+plank','Hip thrusts'],
                 ['🏃 Jog 25 min','⚡ Circuit × 3 rounds: 12 squats + 12 push-ups + 30s plank','🍑 Hip thrusts 3×15','🧘 Kegel 7s×12×3','🥗 Eat light, nutritious dinner'],
                 'Circuit training boosts cardiovascular efficiency — key for recovering quickly between rounds.'],
    [T.CARDIO,   ['Swim or bike 30 min / walk','Kegel morning','Stretch'],
                 ['🏊 Swimming 30 min OR cycling OR long walk — choose what\'s fun','🧘 Morning kegel 7s×15×3','🙆 Stretch 15 min in evening','🥑 Avocado, nuts, eggs today — healthy fats for hormones'],
                 'Variety in cardio keeps motivation high. Your heart doesn\'t know the difference between running and swimming.'],
    [T.REST,     ['Full rest','Sleep 8+ hrs','Hydrate well'],
                 ['😴 Sleep 8–9 hours tonight','💧 Drink 3L water to flush out muscle waste','🛁 Relaxing bath or massage if possible','📊 Review week 2: are habits sticking?'],
                 'Check-in: Are you sleeping better? More energy? These are early signs your body is adapting.'],
  ];

  if (week === 3) return [
    [T.CARDIO,   ['Jog 30 min','Kegel 10s×10×3','Stretch'],
                 ['🏃 Jog 30 minutes — a new milestone!','🧘 Kegel: now 10 second holds × 10 reps × 3 sets (big jump in difficulty)','🙆 Stretch 10 min','💧 2.5L water'],

                 'Phase 3 check-in. If 5 rounds is happening — perfect. If not yet, identify exactly what gives out first.'],
  ];

  if (week >= 24 && week <= 27) return [
    [T.HIIT,     ['HIIT 40 min max','Kegel','Cold shower','Protein'],
                 ['⚡ Max HIIT 40 min: everything you have','🧘 Kegel 15s×25×3','🚿 Cold shower','🥩 Protein within 20 min post workout','🎯 5 rounds should be feeling more natural now'],
                 'By week 24-27, 5 rounds should be occurring regularly. If not, the HIIT this week will seal it.'],
    [T.STRENGTH, ['Peak strength session','Max reps all exercises','Core blast'],
                 ['🏋️ Personal max on all exercises today — test yourself!','🦵 Squats max reps × 3 sets','🍑 Hip thrusts max weight/reps × 3 sets','💪 Push-ups max reps × 3 sets','🏋️ Plank max hold time (new PR?)','🧘 Kegel 15s×25×3'],
                 'Test your personal records this week. Compare to Week 8. The improvement will shock you.'],
    [T.CARDIO,   ['1hr+ run','Kegel','Heart rate tracking'],
                 ['🏃 Run 65 minutes (or 1hr+ continuous)','🧘 Kegel 15s×25×3','📱 Track heart rate recovery — should be under 90 sec now','💧 Full hydration protocol'],
                 'Sub-90-second heart rate recovery is elite athlete territory. If you\'re there, you have world-class stamina.'],
    [T.KEGEL,    ['Kegel 15s×30×5','Reverse kegel','Meditation + visualization'],
                 ['🧘 Kegel 15s×30×5 sets — highest volume ever','🔄 Reverse kegel 12s×25×3','🧘 20 min visualization meditation: 5 rounds, full energy, partner satisfaction','🌬️ Breathing 15 min'],
                 'At this kegel volume, your pelvic floor is at the top 1% of anyone who has ever trained this. Remarkable.'],
    [T.FULL,     ['Run 60 min','Elite circuit','5 rounds standard'],
                 ['🏃 Run 60 min','⚡ Circuit 5 sets: 25 squats + 25 push-ups + 25 hip thrusts + 90s plank','🎯 5 rounds should be your comfortable standard now','🧘 Kegel 15s×15×3','🎉 You are almost at your goal!'],
                 'Phase 3 finale. 5 rounds should now feel like 3 felt in April. That is the entire goal of this training.'],
    [T.RECOVERY, ['Yoga 45 min','Easy walk','Foam roll','Massage'],
                 ['🧘 Yoga 45 min — celebrate your body','🚶 Easy walk 30 min','🔵 Foam rolling 20 min','💆 Book a professional massage — you\'ve earned it!','🥗 Celebratory nutritious meal'],
                 'PHASE 3 COMPLETE ✓ You have hit or are very close to 5 rounds. Phase 4 is maintenance and mastery.'],
    [T.REST,     ['Full rest','9 hrs sleep','Phase 3 completion'],
                 ['😴 9 hours sleep','🎉 Celebrate Phase 3 completion!','📊 Track current round capability honestly','🎯 Phase 4 goal: make 5 rounds effortless and sustainable forever'],
                 'PHASE 3 COMPLETE ✓ The hard work is done. Phase 4 makes this permanent.'],
  ];

  // PHASE 4: MASTERY (weeks 28-36)
  if (week >= 28) return [
    [T.HIIT,     ['HIIT 35 min maintain','Kegel 15s×20×3','Cold shower'],
                 ['⚡ HIIT 35 min maintenance (slightly easier than Phase 3)','🧘 Kegel 15s×20×3','🚿 Cold shower','💧 3L water','🎯 Maintain 5 rounds as your standard'],
                 'Phase 4 is maintenance. You don\'t need to push harder — you need to make this sustainable for life.'],
    [T.STRENGTH, ['Strength maintain','Squats 4×15','Hip thrusts 4×15','Push-ups 4×18','Plank 4×75s'],
                 ['🦵 Squats 4×15 (slightly reduced volume — sustainable)','🍑 Hip thrusts 4×15 with 2s hold','💪 Push-ups 4×18','🏋️ Plank 4×75 seconds','🧘 Kegel 15s×20×3'],
                 'Maintenance strength training is 70% of peak volume. Enough to maintain all gains without burning out.'],
    [T.CARDIO,   ['Run 50 min enjoy','Kegel 15s×20×3'],
                 ['🏃 Run 50 minutes — enjoy it, you\'ve earned this','🧘 Kegel 15s×20×3','🌬️ Nasal breathing practice','💧 Hydration','🎵 Listen to music or podcast you love — make it enjoyable'],
                 'The goal of Phase 4 is to fall in love with exercise so you keep it forever, not just reach a goal.'],
    [T.KEGEL,    ['Kegel 15s×20×4','Reverse kegel','Connection time'],
                 ['🧘 Kegel 15s×20×4 (maintenance level)','🔄 Reverse kegel 10s×20×3','💑 Quality connection time with partner — intimacy is more than rounds','🌬️ Breathing 10 min'],
                 'Phase 4 reminder: the goal was always deeper intimacy with your partner. The fitness is the tool.'],
    [T.FULL,     ['Run 45 min','Maintain circuit','Kegel'],
                 ['🏃 Run 45 min','⚡ Circuit 4 rounds: 20 squats + 20 push-ups + 20 hip thrusts + 75s plank','🧘 Kegel 15s×15×3','🥗 Great nutrition','😊 Enjoy the process — you\'re an athlete now'],
                 'You have transformed your body and health in 7+ months. This Friday session is a celebration.'],
    [T.CARDIO,   ['Fun activity 45 min','Kegel','Yoga or stretch'],
                 ['🎮 FUN activity 45 min: football, badminton, swimming, dancing — anything active!','🧘 Kegel 15s×20×3','🧘 Yoga or stretch 20 min','🥑 Healthy eating'],
                 'Phase 4 introduces fun variety. Badminton, football, dancing all count. Exercise should be joy, not chore.'],
    [T.REST,     ['Full rest','Quality sleep','Celebrate'],
                 ['😴 9 hours quality sleep','🥗 Nutritious meals you enjoy','💑 Quality time with partner','🎉 Celebrate your ongoing achievement — you are 5-round capable now!'],
                 'Every Sunday in Phase 4 is a celebration. You have achieved something most people never do.'],
  ];

  // Default fallback
  return Array(7).fill([T.REST, ['Rest day'], ['😴 Rest day'], 'Rest and recover.']);
}

// ── GENERATE ALL DAYS ─────────────────────────────────────────────────────

function getPhase(week) {
  if (week <= 8)  return { id:'p1', color:'#ff6b47', label:'FOUNDATION' };
  if (week <= 18) return { id:'p2', color:'#e8ff47', label:'BREAKTHROUGH' };
  if (week <= 27) return { id:'p3', color:'#47d4ff', label:'PEAK PERFORMANCE' };
  return              { id:'p4', color:'#b47cff', label:'MASTERY' };
}

// Build a map: "YYYY-M-D" => day data
const dayMap = {};
const startDate = new Date(2026, 3, 20); // Apr 20
const endDate   = new Date(2026, 11, 31); // Dec 31

let weekNum = 1;
// Week starts on Monday. Find the Monday of the week containing Apr 20.
// Apr 20, 2026 is a Monday — perfect!

let d = new Date(startDate);
let dayOfWeek = 0; // 0=Mon in our scheme (Apr 20 = Mon)
let currentWeek = 1;

while (d <= endDate) {
  const plan = getWeekPlan(currentWeek);
  const dow = dayOfWeek % 7; // 0=Mon...6=Sun
  const [type, shortTasks, detailTasks, tip] = plan[dow];
  const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  dayMap[key] = {
    date: new Date(d),
    type,
    shortTasks,
    detailTasks,
    tip,
    week: currentWeek,
    phase: getPhase(currentWeek),
    dow
  };
  d.setDate(d.getDate() + 1);
  dayOfWeek++;
  if (dayOfWeek % 7 === 0) currentWeek++;
  if (currentWeek > 36) currentWeek = 36;
}

// ── RENDER ────────────────────────────────────────────────────────────────

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW_NAMES = ['MON','TUE','WED','THU','FRI','SAT','SUN'];

function dayKey(d) { return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }
function isToday(d) { return dayKey(d) === dayKey(TODAY); }
function isPast(d)  { return d < TODAY && !isToday(d); }

function renderCalendar(filter = 'all') {
  const container = document.getElementById('mainContent');
  container.innerHTML = '';

  // Months: April to December 2026
  for (let month = 3; month <= 11; month++) {
    const firstDay = new Date(2026, month, 1);
    const lastDay  = new Date(2026, month + 1, 0);

    // Check if month has relevant training days
    const hasTraining = (month >= 3);

    const block = document.createElement('div');
    block.className = 'month-block';
    block.id = `month-${month}`;

    // Determine dominant phase for this month
    let dominantPhase = null;
    for (let dd = 1; dd <= lastDay.getDate(); dd++) {
      const dt = new Date(2026, month, dd);
      const k = dayKey(dt);
      if (dayMap[k]) { dominantPhase = dayMap[k].phase; break; }
    }

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'month-header';
    const phaseColor = dominantPhase ? dominantPhase.color : '#fff';
    hdr.innerHTML = `
      <div class="month-name" style="color:${phaseColor}">${MONTH_NAMES[month]}</div>
      <div class="month-year">2026</div>
      ${dominantPhase ? `<div class="month-phase-tag" style="color:${phaseColor};border-color:${phaseColor};background:${phaseColor}18">${dominantPhase.label}</div>` : ''}
    `;
    block.appendChild(hdr);

    // DOW header
    const dowHdr = document.createElement('div');
    dowHdr.className = 'dow-header';
    DOW_NAMES.forEach(d => {
      const lbl = document.createElement('div');
      lbl.className = 'dow-label';
      lbl.textContent = d;
      dowHdr.appendChild(lbl);
    });
    block.appendChild(dowHdr);

    // Days
    // firstDay.getDay(): 0=Sun,1=Mon,...6=Sat → convert to Mon-first: (getDay()+6)%7
    const startOffset = (firstDay.getDay() + 6) % 7;
    let cells = [];
    // Empty cells before start
    for (let i = 0; i < startOffset; i++) {
      cells.push(null);
    }
    for (let d = 1; d <= lastDay.getDate(); d++) {
      cells.push(new Date(2026, month, d));
    }
    // Pad end to multiple of 7
    while (cells.length % 7 !== 0) cells.push(null);

    for (let row = 0; row < cells.length / 7; row++) {
      const weekRow = document.createElement('div');
      weekRow.className = 'week-row';
      for (let col = 0; col < 7; col++) {
        const dt = cells[row * 7 + col];
        const cell = document.createElement('div');
        if (!dt) {
          cell.className = 'day-cell empty';
        } else {
          const k = dayKey(dt);
          const data = dayMap[k];
          if (!data) {
            cell.className = 'day-cell empty';
          } else {
            // Filter check
            const show = (filter === 'all') || (data.phase.id === filter);
            if (!show) {
              cell.className = 'day-cell empty';
              weekRow.appendChild(cell);
              continue;
            }

            cell.className = `day-cell ${data.type.cls}`;
            if (isToday(dt)) { cell.className += ' today'; cell.id = 'today-cell'; }
            else if (isPast(dt)) cell.className += ' past';

            // Content
            let tasksHtml = data.shortTasks.slice(0,3).map(t =>
              `<div class="task-item"><span class="dot"></span>${t}</div>`
            ).join('');

            cell.innerHTML = `
              <div class="day-num">
                ${dt.getDate()}
                ${isToday(dt) ? '<span class="today-dot"></span>' : ''}
              </div>
              <div class="day-type-badge" style="background:${data.type.bg};color:${data.type.color}">
                ${data.type.icon} ${data.type.label}
              </div>
              <div class="day-tasks">${tasksHtml}</div>
              ${data.tip ? `<div class="day-tip">${data.tip.substring(0,60)}…</div>` : ''}
            `;

            cell.addEventListener('click', () => openModal(data, dt));
          }
        }
        weekRow.appendChild(cell);
      }
      block.appendChild(weekRow);
    }

    container.appendChild(block);
  }

  // Update progress
  updateProgress();
}

function updateProgress() {
  const total = Object.keys(dayMap).length;
  const done = Object.keys(dayMap).filter(k => {
    const d = dayMap[k].date;
    return isPast(d);
  }).length;
  const pct = Math.round((done / total) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${done} / ${total} days`;
}

// ── MODAL ─────────────────────────────────────────────────────────────────

function openModal(data, dt) {
  const dayNames = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const dateStr = `${dayNames[data.dow]}, ${MONTH_NAMES[dt.getMonth()]} ${dt.getDate()}, 2026`;

  document.getElementById('mDate').textContent = dateStr + ` · WEEK ${data.week}`;
  document.getElementById('mTitle').textContent = data.type.label;
  document.getElementById('mTypeBadge').innerHTML =
    `<div class="modal-type" style="background:${data.type.bg};color:${data.type.color}">${data.type.icon} ${data.type.label} · ${data.phase.label}</div>`;
  document.getElementById('mStripe').style.background = `linear-gradient(90deg, ${data.phase.color}, ${data.type.color})`;

  document.getElementById('mTasks').innerHTML = data.detailTasks.map(t =>
    `<div class="modal-task"><span class="modal-task-icon">${t.substring(0,2)}</span><span>${t.substring(2)}</span></div>`
  ).join('');

  document.getElementById('mTip').innerHTML = `<strong>💡 COACH'S TIP</strong>${data.tip}`;

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalBtn();
}
function closeModalBtn() {
  document.getElementById('modalOverlay').classList.remove('open');
}

// ── FILTER ────────────────────────────────────────────────────────────────

function filterPhase(phase, el) {
  document.querySelectorAll('.phase-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderCalendar(phase);
}

// ── SCROLL TODAY ──────────────────────────────────────────────────────────

function scrollToToday() {
  const el = document.getElementById('today-cell');
  if (el) el.scrollIntoView({ behavior:'smooth', block:'center' });
}

// ── INIT ──────────────────────────────────────────────────────────────────
renderCalendar('all');
setTimeout(scrollToToday, 300);
</script>
